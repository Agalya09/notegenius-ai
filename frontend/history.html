<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History - NoteGenius AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="pageBody" class="min-h-screen bg-[#f6f3ec] text-slate-900">

  <div class="max-w-7xl mx-auto px-4 py-8 md:px-8">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
      <div>
        <p class="text-sm font-semibold text-slate-500 mb-2">Workspace</p>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Saved History</h1>
        <p class="text-slate-600 mt-3 max-w-2xl">
          View your previously saved summaries, translated content, grammar results, and document outputs.
        </p>
      </div>

      <div class="flex flex-wrap gap-3">
        <a
          href="index.html"
          class="rounded-full bg-slate-900 text-white px-6 py-3 font-medium hover:bg-slate-800 transition"
        >
          Back to Workspace
        </a>

        <button
          onclick="toggleTheme()"
          id="themeBtn"
          class="w-12 h-12 rounded-2xl border border-slate-300 bg-white hover:bg-slate-100 transition text-xl"
          title="Toggle theme"
        >
          🌙
        </button>

        <button
          onclick="logout()"
          class="rounded-full bg-red-500 text-white px-6 py-3 font-medium hover:bg-red-600 transition"
        >
          Logout
        </button>
      </div>
    </div>

    <div id="historyContainer" class="grid lg:grid-cols-2 gap-6">
      <div class="bg-white border border-slate-200 rounded-[28px] shadow-sm p-6 text-slate-500">
        Loading history...
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "http://localhost:5000";
    let currentTheme = localStorage.getItem("theme") || "light";

    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text || "";
      return div.innerHTML;
    }

    async function loadHistory() {
      const user = JSON.parse(localStorage.getItem("user"));
      const container = document.getElementById("historyContainer");

      if (!user || (!user._id && !user.id)) {
        container.innerHTML = `
          <div class="bg-white border border-slate-200 rounded-[28px] shadow-sm p-6 text-red-500">
            User not found. Please login again.
          </div>
        `;
        return;
      }

      try {
        const res = await fetch(`${BASE_URL}/api/summary/${user._id || user.id}`);
        const data = await res.json();

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="bg-white border border-slate-200 rounded-[28px] shadow-sm p-6 text-slate-500">
              No saved results found.
            </div>
          `;
          return;
        }

        let html = "";

        data.forEach(item => {
          html += `
            <div class="bg-white border border-slate-200 rounded-[28px] shadow-sm p-6">
              <div class="flex items-start justify-between gap-4 mb-4">
                <div>
                  <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold mb-2">Saved Result</p>
                  <p class="text-sm text-slate-500">
                    ${item.createdAt ? new Date(item.createdAt).toLocaleString() : "Date unavailable"}
                  </p>
                </div>

                <button
                  onclick="deleteHistoryItem('${item._id}')"
                  class="rounded-full bg-red-50 text-red-600 px-4 py-2 text-sm font-medium hover:bg-red-100 transition"
                >
                  Delete
                </button>
              </div>

              <div class="mb-5">
                <h2 class="text-xl font-semibold mb-2">Summary</h2>
                <p class="text-slate-700 leading-7">${escapeHtml(item.summary || "No summary available")}</p>
              </div>

              ${
                item.points && item.points.length > 0
                  ? `
                  <div class="mb-5">
                    <h3 class="text-lg font-semibold mb-2">Details</h3>
                    <ul class="list-disc pl-5 space-y-2 text-slate-700">
                      ${item.points.map(point => `<li>${escapeHtml(point)}</li>`).join("")}
                    </ul>
                  </div>
                  `
                  : ""
              }

              <details class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                <summary class="cursor-pointer font-medium text-slate-700">View Original Text</summary>
                <p class="mt-3 text-slate-600 whitespace-pre-wrap leading-7">${escapeHtml(item.text || "No original text available")}</p>
              </details>
            </div>
          `;
        });

        container.innerHTML = html;
      } catch (err) {
        console.log("History load error:", err);
        container.innerHTML = `
          <div class="bg-white border border-slate-200 rounded-[28px] shadow-sm p-6 text-red-500">
            Failed to load history.
          </div>
        `;
      }
    }

    async function deleteHistoryItem(id) {
      const confirmDelete = confirm("Delete this saved result?");
      if (!confirmDelete) return;

      try {
        const res = await fetch(`${BASE_URL}/api/summary/${id}`, {
          method: "DELETE"
        });

        const data = await res.json();

        if (res.ok) {
          loadHistory();
        } else {
          alert(data.message || "Delete failed.");
        }
      } catch (err) {
        console.log("Delete history error:", err);
        alert("Delete failed.");
      }
    }

    function applyTheme(theme) {
      const body = document.getElementById("pageBody");
      const themeBtn = document.getElementById("themeBtn");
      const cards = document.querySelectorAll("#historyContainer > div");

      if (theme === "dark") {
        body.className = "min-h-screen bg-slate-950 text-white";
        if (themeBtn) themeBtn.innerText = "☀️";

        cards.forEach(card => {
          card.className = card.className
            .replace("bg-white", "bg-slate-900")
            .replace("border-slate-200", "border-slate-700")
            .replace("text-slate-500", "text-slate-400");
        });
      } else {
        body.className = "min-h-screen bg-[#f6f3ec] text-slate-900";
        if (themeBtn) themeBtn.innerText = "🌙";
      }
    }

    function toggleTheme() {
      currentTheme = currentTheme === "light" ? "dark" : "light";
      localStorage.setItem("theme", currentTheme);
      applyTheme(currentTheme);
      loadHistory();
    }

    applyTheme(currentTheme);
    loadHistory();
  </script>
</body>
</html>
