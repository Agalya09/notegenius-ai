<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History - NoteGenius AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Summary History</h1>
      <div class="space-x-3">
        <a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Home</a>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Logout</button>
      </div>
    </div>

    <div id="historyContainer" class="space-y-4">
      <p class="text-gray-500">Loading history...</p>
    </div>
  </div>

  <script>
    const BASE_URL = "https://notegenius-ai-t75e.onrender.com";

    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadHistory() {
      const user = JSON.parse(localStorage.getItem("user"));
      const container = document.getElementById("historyContainer");

      if (!user || (!user._id && !user.id)) {
        container.innerHTML = "<p class='text-red-500'>User not found. Please login again.</p>";
        return;
      }

      try {
        const res = await fetch(`${BASE_URL}/api/summary/${user._id || user.id}`);
        const data = await res.json();

        if (!res.ok) {
          container.innerHTML = `<p class='text-red-500'>${data.message || "Failed to load history"}</p>`;
          return;
        }

        if (!data || data.length === 0) {
          container.innerHTML = "<p class='text-gray-500'>No history found.</p>";
          return;
        }

        let html = "";

        data.forEach(item => {
          html += `
            <div class="bg-white p-5 rounded-xl shadow">
              <p class="text-sm text-gray-500 mb-2">
                ${new Date(item.createdAt).toLocaleString()}
              </p>

              <h2 class="font-semibold text-lg mb-2">Summary</h2>
              <p class="mb-3">${item.summary || "No summary available"}</p>

              <h3 class="font-medium mb-2">Key Points</h3>
              <ul class="list-disc ml-6 mb-3">
                ${(item.points || []).map(point => `<li>${point}</li>`).join("")}
              </ul>

              <details class="mt-2">
                <summary class="cursor-pointer text-blue-600">View Original Text</summary>
                <p class="mt-2 text-gray-700 whitespace-pre-wrap">${item.text || ""}</p>
              </details>
            </div>
          `;
        });

        container.innerHTML = html;
      } catch (err) {
        console.log("History error:", err);
        container.innerHTML = "<p class='text-red-500'>Failed to load history</p>";
      }
    }

    loadHistory();
  </script>

</body>
</html>
